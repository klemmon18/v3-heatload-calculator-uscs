<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Cellar Systems - BTU Load Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --uscs-primary: #7A1C2D;
            --uscs-secondary: #333333;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f8f9fa;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }
        .bg-uscs-primary { background-color: var(--uscs-primary); }
        .text-uscs-primary { color: var(--uscs-primary); }
        .border-uscs-primary { border-color: var(--uscs-primary); }
        .bg-uscs-secondary { background-color: var(--uscs-secondary); }
        .text-uscs-secondary { color: var(--uscs-secondary); }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            cursor: pointer;
            border-radius: 0;
            border: 2px solid var(--uscs-primary);
        }
        
        /* Remove all default rounding for a truly sharp look */
        * {
            border-radius: 0 !important;
        }
    </style>
